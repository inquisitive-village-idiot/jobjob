# Formatting + linting hooks, run through the project's own locked tooling so local
# results match CI exactly (the "Format" workflow runs the same tools).
#   Python  : isort, black, ruff   (via `uv run`; config in pyproject.toml)
#   Frontend: prettier, eslint     (via npm scripts; config in webapp/frontend/)
# Requires `uv` and `node`/`npm` on PATH.
repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        language: system
        entry: uv run --no-sync isort
        types: [python]
      - id: black
        name: black
        language: system
        entry: uv run --no-sync black
        types: [python]
      - id: ruff
        name: ruff
        language: system
        entry: uv run --no-sync ruff check --fix
        types: [python]
      - id: frontend-format
        name: prettier (frontend)
        language: system
        entry: bash -c 'cd webapp/frontend && npm run format'
        files: ^webapp/frontend/.*\.(ts|tsx|css|json|md)$
        exclude: ^webapp/frontend/(dist|node_modules)/
        pass_filenames: false
      - id: frontend-lint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd webapp/frontend && npm run lint'
        files: ^webapp/frontend/.*\.(ts|tsx)$
        exclude: ^webapp/frontend/(dist|node_modules)/
        pass_filenames: false
