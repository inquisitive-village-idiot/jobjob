# Example skills for the bundled demo persona (Tila Mer, print science correspondent).
# Replace with your own via the Static Content page. `keywords` drive matching against
# a job description; the skills analysis reports which are supported vs. gaps.

[tool.skills]
default_number = 12

[[tool.skills.skill]]
