name: Docs

# Build the Sphinx site and publish it to GitHub Pages (gh-pages branch). The package
# is installed so autodoc can import jobjob and its dependencies.
on:
  push:
    branches: [main]
    paths:
      - "jobjob/**"
      - "docs/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          # The wheel force-includes webapp/frontend/dist (gitignored, built only in the
          # release job). The docs build doesn't need the compiled UI, so create a
          # placeholder dir to satisfy the build backend during the editable install.
          mkdir -p webapp/frontend/dist
          pip install -e .
          pip install sphinx sphinx-rtd-theme myst-parser
      - name: Sphinx build
        run: sphinx-build -b html docs docs/build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build
          force_orphan: true
