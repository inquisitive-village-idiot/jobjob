<!DOCTYPE html>
<!-- SmartRecruiters-like fixture (first/last name fields). Mirrors selectors. -->
<html lang="en">
  <head><meta charset="utf-8" /><title>Apply — Acme (SmartRecruiters)</title></head>
  <body>
    <form>
      <label>First name <input type="text" id="firstName" name="firstName" /></label>
      <label>Last name <input type="text" id="lastName" name="lastName" /></label>
      <label>Email <input type="email" id="email" name="email" /></label>
      <label>Phone <input type="tel" id="phoneNumber" name="phoneNumber" /></label>
      <label>LinkedIn <input type="text" name="linkedin_url" /></label>
      <label>Resume <input type="file" id="resume" name="resume" /></label>
    </form>
  </body>
</html>
